<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Usuarios | Compañía de Bomberos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>

  <header class="hero" id="usersHeader">
    <div>
      <p class="eyebrow">Administración</p>
      <h1>Gestión de Usuarios</h1>
      <p class="subtitle">Crea cuentas, cambia roles, bloquea accesos y actualiza contraseñas.</p>
    </div>
    <div class="user-bar">
      <p id="usersInfo">Cargando...</p>
      <button id="backBtn" class="btn btn-secondary">Volver al inventario</button>
    </div>
  </header>

  <main class="dashboard single-dashboard" id="usersDashboard">
    <section class="panel table-panel">
      <div class="table-header">
        <h3>Nuevo Usuario</h3>
      </div>

      <form id="userForm" class="user-form">
        <div class="grid-3">
          <div>
            <label for="newNombre">Nombre</label>
            <input id="newNombre" name="nombre" type="text" required placeholder="Nombre completo" />
          </div>
          <div>
            <label for="newUsername">Usuario</label>
            <input id="newUsername" name="username" type="text" required placeholder="usuario" />
          </div>
          <div>
            <label for="newPassword">Clave</label>
            <input id="newPassword" name="password" type="password" required placeholder="mínimo 6 caracteres" />
          </div>
        </div>
        <div class="grid-3">
          <div>
            <label for="newRole">Rol</label>
            <select id="newRole" name="role" required>
              <option value="operador">Operador</option>
              <option value="lectura">Solo lectura</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="user-actions-wrap">
            <button type="submit" class="btn btn-primary">Crear usuario</button>
          </div>
        </div>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Usuario</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
      <p class="empty hidden" id="usersEmpty">No hay usuarios creados.</p>
    </section>
  </main>

  <script src="users.js"></script>
</body>
</html>
